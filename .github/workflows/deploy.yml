name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - release/v1.0.0  # 🚀 (기존 main에서 이걸로 변경!)

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install and Build
        run: |
          cd frontend
          npm install
          npm run build
          cp dist/index.html dist/404.html  # 🚀 SPA 새로고침 대응을 위한 404.html 생성
        # 만약 빌드 결과물이 frontend/dist가 아닌 다른 곳이라면 아래 경로를 수정하세요.

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 빌드된 파일이 있는 경로 (Vite 기본값은 dist)
          path: './frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
